# Pre-commit hooks configuration for FHIR Structuring Agent
# See https://pre-commit.com for more information

repos:
  # File health checks (fast, run first)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Ensure files end with newline
      - id: check-yaml
        name: Validate YAML syntax
      - id: check-json
        name: Validate JSON syntax
      - id: check-added-large-files
        name: Prevent large file commits
        args: ['--maxkb=500']
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: debug-statements
        name: Check for debugger imports

  # Code quality - Ruff (linting and formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.5
    hooks:
      - id: ruff
        name: Ruff linter
        args: [--fix]
      - id: ruff-format
        name: Ruff formatter

  # Type checking - mypy strict mode
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        name: Type checking (mypy strict)
        files: ^src/
        exclude: ^(tests/|scripts/)
        additional_dependencies:
          - types-requests
          - pydantic
          - pydantic-settings
        args: [--strict, --ignore-missing-imports, --config-file=pyproject.toml]

  # Security scanning - bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        name: Python security scanner
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # Security scanning - gitleaks (secret detection)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Secret detection

  # Tests - pytest (run all 76 tests)
  - repo: local
    hooks:
      - id: pytest
        name: Run pytest suite
        entry: bash -c 'export PYTHONPATH=/home/dima/fhir-structuring-agent:$PYTHONPATH && cd /home/dima/fhir-structuring-agent && uv run pytest'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
